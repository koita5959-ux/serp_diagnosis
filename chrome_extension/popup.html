<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      color: #4dd0e1;
      font-size: 15px;
      margin-bottom: 12px;
      text-align: center;
    }
    .status-box {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #1a3a5c;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .label { color: #888; }
    .value { color: #4dd0e1; font-weight: bold; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-read {
      background: linear-gradient(135deg, #4dd0e1, #26a69a);
      color: #fff;
    }
    .btn-analyze {
      background: linear-gradient(135deg, #ff9800, #f57c00);
      color: #fff;
    }
    .btn-clear {
      background: #424242;
      color: #aaa;
      font-size: 12px;
      padding: 7px;
    }
    .message {
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      display: none;
    }
    .message.success { display: block; background: #1b5e20; color: #a5d6a7; }
    .message.error { display: block; background: #b71c1c; color: #ef9a9a; }
    .message.info { display: block; background: #0d47a1; color: #90caf9; }
    .settings {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1a3a5c;
    }
    .settings label {
      display: block;
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 6px 8px;
      background: #0f3460;
      border: 1px solid #1a3a5c;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
    }
    .settings input:focus { outline: none; border-color: #4dd0e1; }
    .data-list {
      max-height: 120px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .data-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #1a3a5c;
      font-size: 11px;
    }
    .data-item .query { color: #4dd0e1; }
    .data-item .count { color: #888; }
  </style>
</head>
<body>
  <h1>SERP診断</h1>

  <div class="status-box">
    <div class="status-row">
      <span class="label">蓄積件数</span>
      <span class="value" id="totalCount">0件</span>
    </div>
    <div class="status-row">
      <span class="label">ページ数</span>
      <span class="value" id="pageCount">0ページ</span>
    </div>
    <div id="dataList" class="data-list"></div>
  </div>

  <div id="message" class="message"></div>

  <button class="btn btn-read" id="btnRead">読み取り</button>
  <button class="btn btn-analyze" id="btnAnalyze" disabled>分析</button>
  <button class="btn btn-clear" id="btnClear">クリア</button>

  <div class="settings">
    <label for="serverUrl">サーバーURL</label>
    <input type="text" id="serverUrl" placeholder="http://192.168.0.123:5112">
  </div>

  <script src="popup.js"></script>
</body>
</html>
